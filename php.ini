; PHP 5.6 Configuration for vBank Application
display_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; MySQL compatibility settings
extension=mysql.so
extension=mysqli.so

; Increase memory limit for older PHP
memory_limit = 128M

; Set timezone
date.timezone = "Europe/Berlin"

; Allow deprecated functions for compatibility
; e (create_function, preg_replace with /e modifier) - needed for this app
short_open_tag = On

; Session settings
session.save_path = "/tmp"
session.gc_maxlifetime = 604800

; File upload
upload_max_filesize = 10M
post_max_size = 10M

; Disable some newer security features that might conflict
; This is intentionally permissive for testing purposes
open_basedir = 

; Allow eval for testing purposes (NOT for production!)
; eval() is used by the vulnerable application
